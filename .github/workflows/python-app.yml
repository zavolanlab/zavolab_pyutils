name: Python application tests

# This triggers the workflow on pushes or pull requests to main and dev branches
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against the Python versions you specified in pyproject.toml
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install package AND pytest and other stuff for running the tests
        pip install -e ".[dev]"

    - name: Run all tests with pytest
      run: |
        # This automatically finds TestNormalization in tests/test_normalization.py
        pytest